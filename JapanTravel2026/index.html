<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">

<title>日本旅遊行程 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
:root{
  --bg:#F7F8FA;--surface:#fff;--surface2:#F0F2F5;--border:#E4E8EF;
  --text-primary:#1A1D23;--text-secondary:#6B7280;--text-muted:#9CA3AF;
  --tokyo:#6B9FD4;--tokyo-light:#EBF2FA;
  --hakodate:#6BAE9F;--hakodate-light:#E8F5F2;
  --niseko:#9B7FD4;--niseko-light:#F0EBFA;
  --sapporo:#D4856B;--sapporo-light:#FAF0EB;
  --airport:#7DA86B;--airport-light:#EDF5EA;
  --transit:#C4A35A;--transit-light:#FAF5E8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text-primary);line-height:1.6;font-size:14px}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:32px 24px 24px;text-align:center}
.header-flag{font-size:32px;margin-bottom:8px}
.header h1{font-size:24px;font-weight:700;letter-spacing:.04em}
.header-sub{font-size:13px;color:var(--text-secondary);margin-top:4px}
.flight-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.flight-pill{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--text-secondary)}
.flight-pill .fn{font-weight:600;color:var(--text-primary)}
.overview{display:flex;flex-wrap:wrap;gap:8px;padding:16px 24px;justify-content:center}
.area-chip{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:500;border:1.5px solid transparent}
.area-chip.tokyo   {background:var(--tokyo-light);  color:var(--tokyo);  border-color:#C2D9F0}
.area-chip.hakodate{background:var(--hakodate-light);color:var(--hakodate);border-color:#BDE0DA}
.area-chip.niseko  {background:var(--niseko-light); color:var(--niseko); border-color:#CFBFF0}
.area-chip.sapporo {background:var(--sapporo-light);color:var(--sapporo);border-color:#F0CEBE}
.area-chip.airport {background:var(--airport-light);color:var(--airport);border-color:#C2DFBA}
.chip-days{background:rgba(0,0,0,.08);border-radius:4px;padding:1px 6px;font-size:11px}
.main{max-width:800px;margin:0 auto;padding:14px 14px 48px}
/* Day card */
.day-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:12px;overflow:hidden}
.day-header{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
.day-header:hover{background:var(--surface2)}
.day-badge{min-width:50px;height:50px;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0}
.day-badge .day-num{font-size:19px;font-weight:700;line-height:1.1}
.day-badge.tokyo   {background:var(--tokyo-light);  color:var(--tokyo)}
.day-badge.hakodate{background:var(--hakodate-light);color:var(--hakodate)}
.day-badge.niseko  {background:var(--niseko-light); color:var(--niseko)}
.day-badge.sapporo {background:var(--sapporo-light);color:var(--sapporo)}
.day-badge.airport {background:var(--airport-light);color:var(--airport)}
.day-badge.transit {background:var(--transit-light);color:var(--transit)}
.day-title-block{flex:1}
.day-title-block h2{font-size:15px;font-weight:600}
.day-title-block .day-meta{font-size:12px;color:var(--text-secondary);margin-top:2px}
.day-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.tag{font-size:11px;padding:2px 8px;border-radius:4px;background:var(--surface2);color:var(--text-secondary);border:1px solid var(--border)}
.chevron{color:var(--text-muted);font-size:16px;transition:transform .2s;flex-shrink:0}
.day-card.open .chevron{transform:rotate(90deg)}
.day-body{display:none}
.day-card.open .day-body{display:block}
/* Map */
.map-section{border-bottom:1px solid var(--border);background:var(--surface2)}
.map-toggle{display:flex;align-items:center;gap:8px;padding:10px 16px;cursor:pointer;user-select:none;font-size:13px;font-weight:500;color:var(--text-secondary)}
.map-toggle:hover{background:var(--border)}
.map-chevron{margin-left:auto;color:var(--text-muted);font-size:14px;transition:transform .2s}
.map-toggle.open .map-chevron{transform:rotate(90deg)}
.map-wrap{display:none;padding:0 16px 14px}
.map-wrap.visible{display:block}
.map-container{position:relative;width:100%;background:#e8f0e8;border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:grab}
.map-container:active{cursor:grabbing}
.map-container svg{display:block;width:100%;height:auto}
/* Tooltip */
.map-tooltip{position:absolute;background:#1A1D23;color:#fff;border-radius:8px;padding:8px 12px;font-size:12px;pointer-events:none;opacity:0;transition:opacity .15s;z-index:100;max-width:200px;line-height:1.5}
.map-tooltip .tt-title{font-weight:700;font-size:13px;margin-bottom:3px}
.map-tooltip .tt-badge{font-size:10px;padding:1px 6px;border-radius:8px;display:inline-block;margin-bottom:3px}
/* Pin list */
.map-pins{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.spot-pin{display:flex;align-items:center;gap:5px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:3px 9px;font-size:12px;color:var(--text-primary);cursor:pointer;text-decoration:none;transition:all .15s}
.spot-pin:hover{border-color:#9CA3AF;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.pin-num{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
/* Legend */
.map-legend{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-secondary);background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:2px 8px}
.legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
/* Zoom controls */
.zoom-controls{position:absolute;top:8px;right:8px;display:flex;flex-direction:column;gap:3px;z-index:10}
.zoom-btn{width:28px;height:28px;background:var(--surface);border:1px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;font-weight:700;color:var(--text-secondary);user-select:none}
.zoom-btn:hover{background:var(--surface2)}
/* Layer toggles */
.layer-bar{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;margin-bottom:2px;align-items:center}
.layer-bar-label{font-size:11px;color:var(--text-muted);font-weight:600;letter-spacing:.05em;margin-right:2px}
.layer-btn{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:14px;font-size:12px;font-weight:500;cursor:pointer;user-select:none;border:1.5px solid;transition:all .15s}
.layer-btn.active{color:#fff !important}
.layer-btn:not(.active){background:var(--surface) !important;color:var(--text-secondary) !important}
/* Timeline */
.day-content{padding:16px}
.timeline{position:relative;padding-left:26px}
.timeline::before{content:'';position:absolute;left:6px;top:8px;bottom:8px;width:2px;background:var(--border);border-radius:1px}
.tl-item{position:relative;margin-bottom:16px}
.tl-item:last-child{margin-bottom:0}
.tl-dot{position:absolute;left:-22px;top:5px;width:10px;height:10px;border-radius:50%;background:var(--border);border:2px solid var(--surface);box-shadow:0 0 0 2px var(--border)}
.tl-dot.flight{background:#6B9FD4;box-shadow:0 0 0 2px #C2D9F0}
.tl-dot.food  {background:#E8916A;box-shadow:0 0 0 2px #F5D0BE}
.tl-dot.sight {background:#6BAE9F;box-shadow:0 0 0 2px #BDE0DA}
.tl-dot.shop  {background:#9B7FD4;box-shadow:0 0 0 2px #CFBFF0}
.tl-dot.hotel {background:#7DA86B;box-shadow:0 0 0 2px #C2DFBA}
.tl-dot.car   {background:#C4A35A;box-shadow:0 0 0 2px #E8D9B0}
.tl-time{font-size:11px;color:var(--text-muted);font-weight:500;margin-bottom:2px}
.tl-title{font-size:14px;font-weight:600;margin-bottom:2px}
.tl-desc{font-size:13px;color:var(--text-secondary);line-height:1.5}
.tl-sub{font-size:12px;color:var(--text-muted);margin-top:2px}
.section-label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin:18px 0 8px;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.food-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-top:10px}
.food-card{background:#FEF8F4;border:1px solid #F5D0BE;border-radius:8px;padding:9px 11px}
.food-card .fc-name{font-size:13px;font-weight:600;color:#C4614A}
.food-card .fc-desc{font-size:12px;color:var(--text-secondary);margin-top:2px}
.shop-card{background:var(--niseko-light);border:1px solid #CFBFF0;border-radius:8px;padding:9px 11px}
.shop-card .sh-name{font-size:13px;font-weight:600;color:var(--niseko)}
.shop-card .sh-desc{font-size:12px;color:var(--text-secondary);margin-top:2px}
.tips-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px 13px;margin-top:14px}
.tips-box-title{font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:6px;letter-spacing:.05em;text-transform:uppercase}
.tips-list{list-style:none}
.tips-list li{font-size:12.5px;color:var(--text-secondary);padding:2px 0;display:flex;gap:6px}
.tips-list li::before{content:'→';color:var(--text-muted);flex-shrink:0}
.footer{text-align:center;font-size:12px;color:var(--text-muted);padding:24px;border-top:1px solid var(--border);background:var(--surface);margin-top:32px}
@media(max-width:520px){.header h1{font-size:20px}.food-grid{grid-template-columns:1fr 1fr}}
</style>
</head>

// ── Tile-based map renderer (OSM tiles loaded by browser) ──
const MAP_W = 700, MAP_H = 340;

// Web Mercator helpers
function lng2tile(lng, z) { return (lng + 180) / 360 * Math.pow(2, z); }
function lat2tile(lat, z) {
  const r = lat * Math.PI / 180;
  return (1 - Math.log(Math.tan(r) + 1/Math.cos(r)) / Math.PI) / 2 * Math.pow(2, z);
}
function tile2lng(x, z) { return x / Math.pow(2, z) * 360 - 180; }
function tile2lat(y, z) {
  const n = Math.PI - 2 * Math.PI * y / Math.pow(2, z);
  return 180 / Math.PI * Math.atan(0.5 * (Math.exp(n) - Math.exp(-n)));
}

// degree-zoom → OSM zoom level
function getOsmZ(degZoom) {
  // degZoom 0.5–2.5 → osmZ 9–15
  if (degZoom >= 2.0) return 12;
  if (degZoom >= 1.3) return 13;
  if (degZoom >= 0.8) return 13;
  if (degZoom >= 0.5) return 11;
  return 10;
}

const _mapState = {}; // containerId -> {cx,cy,osmZ,txOrig,tyOrig,pxOrig,pyOrig}

function buildMap(dayData, containerId) {
  const data = dayData.map;
  if (!data) return;
  const container = document.getElementById(containerId);
  if (!container) return;

  const { cx, cy } = data;
  const osmZ = _mapState[containerId] ? _mapState[containerId].osmZ : getOsmZ(data.zoom);

  // Center tile (fractional)
  const tcx = lng2tile(cx, osmZ);
  const tcy = lat2tile(cy, osmZ);

  // Tile size in px
  const TS = 256;

  // How many tiles we need
  const tilesX = Math.ceil(MAP_W / TS) + 2;
  const tilesY = Math.ceil(MAP_H / TS) + 2;

  // Top-left tile index
  const tx0 = Math.floor(tcx) - Math.floor(tilesX / 2);
  const ty0 = Math.floor(tcy) - Math.floor(tilesY / 2);

  // Pixel offset of center
  const pxCenter = (tcx - tx0) * TS;
  const pyCenter = (tcy - ty0) * TS;
  const ox = MAP_W / 2 - pxCenter;
  const oy = MAP_H / 2 - pyCenter;

  // Store state for zoom
  _mapState[containerId] = { cx, cy, osmZ, tx0, ty0, ox, oy, TS };

  // Build tile images
  let tilesHTML = '';
  const maxTile = Math.pow(2, osmZ);
  for (let dy = 0; dy < tilesY; dy++) {
    for (let dx = 0; dx < tilesX; dx++) {
      const tx = ((tx0 + dx) % maxTile + maxTile) % maxTile;
      const ty = ty0 + dy;
      if (ty < 0 || ty >= maxTile) continue;
      const px = ox + dx * TS;
      const py = oy + dy * TS;
      const url = `https://tile.openstreetmap.org/${osmZ}/${tx}/${ty}.png`;
      tilesHTML += `<image href="${url}" x="${px.toFixed(1)}" y="${py.toFixed(1)}" width="${TS}" height="${TS}" crossorigin="anonymous"/>`;
    }
  }

  // Convert lat/lng to pixel on this map
  function spotToXY(lat, lng) {
    const tx = lng2tile(lng, osmZ);
    const ty = lat2tile(lat, osmZ);
    const px = ox + (tx - tx0) * TS;
    const py = oy + (ty - ty0) * TS;
    return { x: px, y: py };
  }

  // ── Helper: build marker SVG for a spot ──
  function makeMarkerSVG(s, num, extraClass) {
    const tc = TYPES[s.type] || TYPES[s.cat] || { fill:'#999', bg:'#eee', color:'#666', emoji:'', label:'' };
    const { x, y } = spotToXY(s.lat, s.lng);
    // Extra spots use diamond shape to distinguish
    const shape = extraClass
      ? `<path d="M0-18 L8-8 L0,6 L-8-8 Z" fill="${tc.fill}" stroke="white" stroke-width="2"/>`
      : `<path d="M0-22C-6-22-11-17-11-11c0,7,11,22,11,22s11-15,11-22C11-17,6-22,0-22z" fill="${tc.fill}" stroke="white" stroke-width="2"/><circle r="6" cy="-11" fill="white"/>`;
    const labelY = extraClass ? '-5' : '-7.5';
    return `<g class="map-marker ${extraClass||''}" data-label="${s.label.replace(/"/g,'&quot;')}" data-desc="${(s.desc||'').replace(/"/g,'&quot;')}" data-type="${s.type||s.cat||''}" data-lat="${s.lat}" data-lng="${s.lng}" style="cursor:pointer" transform="translate(${x.toFixed(1)},${y.toFixed(1)})">
      ${shape}
      <text y="${labelY}" text-anchor="middle" dominant-baseline="middle" font-size="7" font-weight="700" fill="${extraClass?tc.fill:'#fff'}">${num}</text>
    </g>`;
  }

  // ── Main spots ──
  let markersSVG = '';
  let pinsHTML = '';
  const usedTypes = [];

  data.spots.forEach((s, i) => {
    const tc = TYPES[s.type] || { fill:'#999', bg:'#eee', color:'#666', emoji:'', label:'' };
    if (!usedTypes.includes(s.type)) usedTypes.push(s.type);
    markersSVG += makeMarkerSVG(s, i+1, '');
    pinsHTML += `<span class="spot-pin" data-map="${containerId}" data-idx="${i}">
      <span class="pin-num" style="background:${tc.fill}">${i+1}</span>${s.label}
    </span>`;
  });

  // ── Extra layer spots ──
  const region = DAY_REGION[dayData.id];
  const extraSpots = region ? (EXTRA_SPOTS[region] || []) : [];
  const CAT_GROUPS = [
    { cats:['food'],        label:'🍜 美食清單', fill:'#E8916A', borderColor:'#E8916A' },
    { cats:['mall'],        label:'🏬 大型商場', fill:'#FB7185', borderColor:'#FB7185' },
    { cats:['electronics'], label:'📷 電器行',   fill:'#3B82F6', borderColor:'#3B82F6' },
    { cats:['secondhand'],  label:'♻️ 二手店',  fill:'#22C55E', borderColor:'#22C55E' },
    { cats:['drugstore'],   label:'💊 藥妝店',  fill:'#F97316', borderColor:'#F97316' }
  ];

  // init layer state
  if (!_layerState[containerId]) {
    _layerState[containerId] = { food:false, mall:false, lifestyle:false, electronics:false, secondhand:false, drugstore:false };
  }

  let extraLayersSVG = '';
  CAT_GROUPS.forEach(g => {
    const groupSpots = extraSpots.filter(s => g.cats.includes(s.cat));
    let groupSVG = '';
    groupSpots.forEach((s, i) => { groupSVG += makeMarkerSVG(s, i+1, 'extra-marker'); });
    const isOn = _layerState[containerId][g.cats[0]];
    extraLayersSVG += `<g class="extra-layer" id="${containerId}-layer-${g.cats[0]}" style="display:${isOn?'block':'none'}">${groupSVG}</g>`;
  });

  // ── Compass ──
  const compass = `<g transform="translate(${MAP_W-30},30)">
    <circle r="16" fill="white" stroke="#ccc" stroke-width="1" opacity="0.9"/>
    <text text-anchor="middle" y="-3" font-size="9" font-weight="700" fill="#E63950">N</text>
    <polygon points="0,-12 2.5,0 -2.5,0" fill="#E63950"/>
    <polygon points="0,12 2.5,0 -2.5,0" fill="#999"/>
  </g>`;

  // ── Attribution ──
  const attr = `<rect x="0" y="${MAP_H-18}" width="${MAP_W}" height="18" fill="white" opacity="0.75"/>
    <text x="6" y="${MAP_H-5}" font-size="9.5" fill="#555">© OpenStreetMap contributors</text>`;

  // ── Legend ──
  let legendHTML = '<div class="map-legend">';
  usedTypes.forEach(t => {
    const tc = TYPES[t];
    if (tc) legendHTML += `<span class="legend-item"><span class="legend-dot" style="background:${tc.fill}"></span>${tc.emoji} ${tc.label}</span>`;
  });
  legendHTML += '</div>';

  // ── Layer toggle buttons ──
  let layerBarHTML = '';
  if (extraSpots.length > 0) {
    layerBarHTML = `<div class="layer-bar"><span class="layer-bar-label">圖層顯示：</span>`;
    CAT_GROUPS.forEach(g => {
      const count = extraSpots.filter(s => g.cats.includes(s.cat)).length;
      if (count === 0) return;
      const isOn = _layerState[containerId][g.cats[0]];
      const bg = isOn ? g.fill : 'var(--surface)';
      const col = isOn ? '#fff' : 'var(--text-secondary)';
      layerBarHTML += `<button class="layer-btn${isOn?' active':''}"
        style="border-color:${g.fill};background:${bg};color:${col}"
        onclick="toggleLayer('${containerId}','${g.cats[0]}','${g.fill}',this)">
        ${g.label} <span style="opacity:.7">(${count})</span>
      </button>`;
    });
    layerBarHTML += '</div>';
  }

  container.innerHTML = `
    ${layerBarHTML}
    <div class="map-container" id="${containerId}-mc" style="position:relative;overflow:hidden;border-radius:10px;border:1px solid var(--border)">
      <svg id="${containerId}-svg" viewBox="0 0 ${MAP_W} ${MAP_H}" style="display:block;width:100%;height:auto" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
        <rect width="${MAP_W}" height="${MAP_H}" fill="#e8f0e8"/>
        <g id="${containerId}-vp">
          <g id="${containerId}-tiles">${tilesHTML}</g>
          <g id="${containerId}-markers">${markersSVG}</g>
          ${extraLayersSVG}
        </g>
        ${compass}
        ${attr}
      </svg>
      <div class="map-tooltip" id="${containerId}-tip" style="position:absolute;background:#1a1d23;color:#fff;border-radius:8px;padding:8px 12px;font-size:12px;pointer-events:none;opacity:0;transition:opacity .15s;z-index:10;max-width:210px;line-height:1.5;white-space:normal"></div>
      <div style="position:absolute;top:8px;right:8px;display:flex;flex-direction:column;gap:3px;z-index:10">
        <div class="zoom-btn" onclick="zoomMap('${containerId}',1)">+</div>
        <div class="zoom-btn" onclick="zoomMap('${containerId}',-1)">−</div>
      </div>
    </div>
    <div class="map-pins" id="${containerId}-pins">${pinsHTML}</div>
    ${legendHTML}`;

  bindMapEvents(containerId, data, extraSpots);
}

// ── Layer toggle ──
function toggleLayer(containerId, cat, fillColor, btn) {
  const layerEl = document.getElementById(`${containerId}-layer-${cat}`);
  if (!layerEl) return;
  if (!_layerState[containerId]) _layerState[containerId] = {};
  const isOn = _layerState[containerId][cat];
  _layerState[containerId][cat] = !isOn;
  layerEl.style.display = isOn ? 'none' : 'block';
  if (isOn) {
    btn.classList.remove('active');
    btn.style.background = 'var(--surface)';
    btn.style.color = 'var(--text-secondary)';
  } else {
    btn.classList.add('active');
    btn.style.background = fillColor;
    btn.style.color = '#fff';
  }
}

function bindMapEvents(containerId, data, extraSpots) {
  const mc = document.getElementById(containerId + '-mc');
  const tip = document.getElementById(containerId + '-tip');
  if (!mc || !tip) return;

  const showTip = (label, desc, type, relX, relY, lat, lng) => {
    const tc = TYPES[type] || { bg:'#eee', color:'#555', emoji:'', label:'' };
    const gmapUrl = lat && lng
      ? `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`
      : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(label+' Japan')}`;
    tip.innerHTML = `
      <div style="font-weight:700;font-size:13px;margin-bottom:3px">${label}</div>
      <span style="font-size:10px;padding:1px 7px;border-radius:8px;background:${tc.bg};color:${tc.color};display:inline-block;margin-bottom:5px">${tc.emoji} ${tc.label}</span>
      <div style="font-size:12px;margin-bottom:6px">${desc}</div>
      <a href="${gmapUrl}" target="_blank" rel="noopener"
        style="display:inline-flex;align-items:center;gap:4px;background:#4285F4;color:#fff;border-radius:6px;padding:4px 9px;font-size:11px;font-weight:600;text-decoration:none;pointer-events:auto"
        onclick="event.stopPropagation()">
        🗺 Google Maps 開啟
      </a>`;
    const svgEl = mc.querySelector('svg');
    const scaleX = svgEl.clientWidth / MAP_W;
    const tipW = 220;
    let lx = relX * scaleX + 14;
    let ly = relY * scaleX - 110;
    if (lx + tipW > mc.clientWidth) lx = relX * scaleX - tipW - 6;
    if (ly < 4) ly = 4;
    tip.style.left = lx + 'px';
    tip.style.top = ly + 'px';
    tip.style.opacity = '1';
    tip.style.pointerEvents = 'auto';
  };

  const hideTip = () => { tip.style.opacity = '0'; };

  // Bind all markers (main + extra)
  mc.querySelectorAll('.map-marker').forEach(el => {
    const label = el.dataset.label || '';
    const desc  = el.dataset.desc  || '';
    const type  = el.dataset.type  || '';
    const lat   = parseFloat(el.dataset.lat) || null;
    const lng   = parseFloat(el.dataset.lng) || null;

    el.addEventListener('mouseenter', () => {
      const t = el.getAttribute('transform').match(/translate\(([^,]+),([^)]+)\)/);
      if (t) showTip(label, desc, type, parseFloat(t[1]), parseFloat(t[2]), lat, lng);
    });
    el.addEventListener('mouseleave', e => {
      // Don't hide if mouse moves onto the tooltip
      setTimeout(() => {
        if (!tip.matches(':hover')) hideTip();
      }, 120);
    });
    el.addEventListener('click', e => {
      e.stopPropagation();
      const t = el.getAttribute('transform').match(/translate\(([^,]+),([^)]+)\)/);
      if (t) showTip(label, desc, type, parseFloat(t[1]), parseFloat(t[2]), lat, lng);
    });
  });

  // ── Pan / drag ──
  let drag = null;
  const getXY = e => e.touches ? { x: e.touches[0].clientX, y: e.touches[0].clientY }
                                : { x: e.clientX, y: e.clientY };
  const svgEl = mc.querySelector('svg');
  const scaleRatio = () => MAP_W / svgEl.clientWidth;

  const vpEl = () => document.getElementById(containerId + '-vp');

  const getVpOffset = () => {
    const vp = vpEl();
    if (!vp) return { dx: 0, dy: 0 };
    const t = (vp.getAttribute('transform') || '').match(/translate\(([^,]+),([^)]+)\)/);
    return t ? { dx: parseFloat(t[1]), dy: parseFloat(t[2]) } : { dx: 0, dy: 0 };
  };

  const onDragStart = e => {
    if (e.target.closest('.zoom-btn') || e.target.closest('.map-marker')) return;
    const { x, y } = getXY(e);
    const { dx, dy } = getVpOffset();
    drag = { startX: x, startY: y, origDx: dx, origDy: dy };
    mc.style.cursor = 'grabbing';
    e.preventDefault();
  };

  let lastRefill = 0;
  const onDragMove = e => {
    if (!drag) return;
    e.preventDefault();
    const { x, y } = getXY(e);
    const r = scaleRatio();
    const dx = drag.origDx + (x - drag.startX) * r;
    const dy = drag.origDy + (y - drag.startY) * r;
    const vp = vpEl();
    if (vp) vp.setAttribute('transform', `translate(${dx.toFixed(1)},${dy.toFixed(1)})`);
    // Throttled tile refill every 150ms
    const now = Date.now();
    if (now - lastRefill > 150) { refillTiles(containerId); lastRefill = now; }
  };

  const onDragEnd = e => {
    if (!drag) return;
    // Update _mapState ox/oy to bake in the pan offset
    const { dx, dy } = getVpOffset();
    const st = _mapState[containerId];
    if (st) _mapState[containerId] = { ...st, ox: st.ox + dx, oy: st.oy + dy };
    // Remove transform and shift all tile positions by the offset
    const vp = vpEl();
    if (vp) {
      vp.removeAttribute('transform');
      vp.querySelectorAll('image').forEach(img => {
        img.setAttribute('x', (parseFloat(img.getAttribute('x')) + dx).toFixed(1));
        img.setAttribute('y', (parseFloat(img.getAttribute('y')) + dy).toFixed(1));
      });
      vp.querySelectorAll('.map-marker').forEach(el => {
        const t = el.getAttribute('transform').match(/translate\(([^,]+),([^)]+)\)/);
        if (t) el.setAttribute('transform',
          `translate(${(parseFloat(t[1])+dx).toFixed(1)},${(parseFloat(t[2])+dy).toFixed(1)})`);
      });
    }
    drag = null;
    mc.style.cursor = 'grab';
    // refill tiles that may now be needed
    refillTiles(containerId);
  };

  mc.addEventListener('mousedown',  onDragStart);
  mc.addEventListener('touchstart', onDragStart, { passive: false });
  window.addEventListener('mousemove',  onDragMove);
  window.addEventListener('touchmove',  onDragMove, { passive: false });
  window.addEventListener('mouseup',  onDragEnd);
  window.addEventListener('touchend', onDragEnd);

  // Tooltip hides when mouse leaves it
  tip.addEventListener('mouseleave', hideTip);

  mc.addEventListener('click', e => {
    if (drag !== null) return;
    if (!e.target.closest('.map-marker') && !tip.contains(e.target)) hideTip();
  });

  // Pin list → highlight marker
  const pinsEl = document.getElementById(containerId + '-pins');
  if (pinsEl) {
    pinsEl.querySelectorAll('.spot-pin').forEach(pin => {
      pin.addEventListener('click', () => {
        const idx = parseInt(pin.dataset.idx);
        const markers = mc.querySelectorAll('.map-marker:not(.extra-marker)');
        markers.forEach(m => m.querySelector('path').style.strokeWidth = '2');
        if (markers[idx]) {
          markers[idx].querySelector('path').style.strokeWidth = '4';
          const s = data.spots[idx];
          const t = markers[idx].getAttribute('transform').match(/translate\(([^,]+),([^)]+)\)/);
          const lat = parseFloat(markers[idx].dataset.lat) || null;
          const lng = parseFloat(markers[idx].dataset.lng) || null;
          if (t) showTip(s.label, s.desc, s.type, parseFloat(t[1]), parseFloat(t[2]), lat, lng);
          setTimeout(() => { markers.forEach(m => m.querySelector('path').style.strokeWidth = '2'); }, 5000);
        }
      });
    });
  }
}

function zoomMap(containerId, delta) {
  const st = _mapState[containerId];
  if (!st) return;
  const dayId = parseInt(containerId.replace('map-wrap-d',''));
  const day = DAYS.find(d => d.id === dayId);
  if (!day || !day.map) return;
  const newZ = Math.max(8, Math.min(17, st.osmZ + delta));
  if (newZ === st.osmZ) return;

  // Compute current screen-center lat/lng from existing state (accounting for pan)
  // Screen center (MAP_W/2, MAP_H/2) in tile coords:
  const vp = document.getElementById(containerId + '-vp');
  let vpDx = 0, vpDy = 0;
  if (vp) {
    const t = (vp.getAttribute('transform') || '').match(/translate\(([^,]+),([^)]+)\)/);
    if (t) { vpDx = parseFloat(t[1]); vpDy = parseFloat(t[2]); }
  }
  // effective ox/oy = state ox + vp offset
  const effOx = st.ox + vpDx;
  const effOy = st.oy + vpDy;
  // tile coords of screen center
  const centerTileX = st.tx0 + (MAP_W/2 - effOx) / st.TS;
  const centerTileY = st.ty0 + (MAP_H/2 - effOy) / st.TS;
  // convert to lng/lat
  const newCx = tile2lng(centerTileX, st.osmZ);
  const newCy = tile2lat(centerTileY, st.osmZ);

  // Rebuild with new zoom centered on current view center
  const newDay = { ...day, map: { ...day.map, cx: newCx, cy: newCy } };
  _mapState[containerId] = { ...st, osmZ: newZ };
  buildMap(newDay, containerId);
}

// ── Refill tiles when panned near edge ──
function refillTiles(containerId) {
  const st = _mapState[containerId];
  if (!st) return;
  const vp = document.getElementById(containerId + '-vp');
  if (!vp) return;

  // current effective ox/oy
  let vpDx = 0, vpDy = 0;
  const t = (vp.getAttribute('transform') || '').match(/translate\(([^,]+),([^)]+)\)/);
  if (t) { vpDx = parseFloat(t[1]); vpDy = parseFloat(t[2]); }
  const effOx = st.ox + vpDx;
  const effOy = st.oy + vpDy;

  const { osmZ, TS } = st;
  const maxTile = Math.pow(2, osmZ);
  const PAD = 1; // tiles of padding required

  // Current tile grid bounds in screen space
  const tilesG = vp.querySelector(`[id$="-tiles"]`);
  if (!tilesG) return;
  const imgs = tilesG.querySelectorAll('image');
  if (!imgs.length) return;

  // We need tiles to cover [0..MAP_W] x [0..MAP_H] with PAD extra
  const needLeft   = -PAD * TS;
  const needTop    = -PAD * TS;
  const needRight  = MAP_W + PAD * TS;
  const needBottom = MAP_H + PAD * TS;

  // Find current tile extent
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  let minTileCol = Infinity, maxTileCol = -Infinity;
  let minTileRow = Infinity, maxTileRow = -Infinity;

  imgs.forEach(img => {
    const ix = parseFloat(img.getAttribute('x'));
    const iy = parseFloat(img.getAttribute('y'));
    const sx = ix + vpDx; // screen x
    const sy = iy + vpDy;
    minX = Math.min(minX, sx); maxX = Math.max(maxX, sx + TS);
    minY = Math.min(minY, sy); maxY = Math.max(maxY, sy + TS);
  });

  // Compute tile col/row range from img data attributes (use position)
  // Reconstruct: tile col = tx0 + (imgX - origOx) / TS
  imgs.forEach(img => {
    const ix = parseFloat(img.getAttribute('x'));
    const iy = parseFloat(img.getAttribute('y'));
    const col = Math.round((ix - st.ox) / TS);
    const row = Math.round((iy - st.oy) / TS);
    minTileCol = Math.min(minTileCol, col);
    maxTileCol = Math.max(maxTileCol, col);
    minTileRow = Math.min(minTileRow, row);
    maxTileRow = Math.max(maxTileRow, row);
  });

  let added = false;
  const addTile = (col, row) => {
    const tx = ((st.tx0 + col) % maxTile + maxTile) % maxTile;
    const ty = st.ty0 + row;
    if (ty < 0 || ty >= maxTile) return;
    const px = st.ox + col * TS;
    const py = st.oy + row * TS;
    const img = document.createElementNS('http://www.w3.org/2000/svg', 'image');
    img.setAttribute('href', `https://tile.openstreetmap.org/${osmZ}/${tx}/${ty}.png`);
    img.setAttribute('x', px.toFixed(1));
    img.setAttribute('y', py.toFixed(1));
    img.setAttribute('width', TS);
    img.setAttribute('height', TS);
    img.setAttribute('crossorigin', 'anonymous');
    tilesG.appendChild(img);
    added = true;
  };

  // Expand left
  if (minX + vpDx > needLeft) {
    const newCol = minTileCol - 1;
    for (let r = minTileRow; r <= maxTileRow; r++) addTile(newCol, r);
    minTileCol = newCol;
  }
  // Expand right
  if (maxX + vpDx < needRight) {
    const newCol = maxTileCol + 1;
    for (let r = minTileRow; r <= maxTileRow; r++) addTile(newCol, r);
    maxTileCol = newCol;
  }
  // Expand top
  if (minY + vpDy > needTop) {
    const newRow = minTileRow - 1;
    for (let c = minTileCol; c <= maxTileCol; c++) addTile(c, newRow);
    minTileRow = newRow;
  }
  // Expand bottom
  if (maxY + vpDy < needBottom) {
    const newRow = maxTileRow + 1;
    for (let c = minTileCol; c <= maxTileCol; c++) addTile(c, newRow);
    maxTileRow = newRow;
  }
}

// ── Render days ──
function renderDay(d) {
  const mapId = 'map-wrap-d' + d.id;
  const mapSection = d.map ? `
    <div class="map-section">
      <div class="map-toggle" id="maptoggle${d.id}" onclick="toggleMap(${d.id})">
        <span>🗺️</span><span>今日景點地圖</span>
        <span class="map-chevron">›</span>
      </div>
      <div class="map-wrap" id="${mapId}"></div>
    </div>` : '';

  const timelineHTML = d.timeline.map(t => `
    <div class="tl-item">
      <div class="tl-dot ${t.dot}"></div>
      <div class="tl-time">${t.time}</div>
      <div class="tl-title">${t.title}</div>
      <div class="tl-desc">${t.desc}</div>
      ${t.sub ? `<div class="tl-sub">${t.sub}</div>` : ''}
    </div>`).join('');

  const tipsHTML = d.tips ? `<div class="tips-box">
    <div class="tips-box-title">💡 小提醒</div>
    <ul class="tips-list">${d.tips.map(t => `<li>${t}</li>`).join('')}</ul>
  </div>` : '';

  const shopCardsHTML = d.shopCards ? `
    <div class="section-label">今日購物重點</div>
    <div class="food-grid">${d.shopCards.map(c => `
      <div class="shop-card"><div class="sh-name">${c.name}</div><div class="sh-desc">${c.desc}</div></div>`).join('')}
    </div>` : '';

  const tagsHTML = d.tags.map(t => `<span class="tag">${t}</span>`).join('');

  return `<div class="day-card open" id="d${d.id}">
    <div class="day-header" onclick="toggle('d${d.id}')">
      <div class="day-badge ${d.theme}"><span>${d.date}</span><span class="day-num">${d.id}</span><span>${d.dow}</span></div>
      <div class="day-title-block">
        <h2>${d.icon} ${d.title}</h2>
        <div class="day-meta">${d.meta}</div>
        <div class="day-tags">${tagsHTML}</div>
      </div>
      <span class="chevron">›</span>
    </div>
    <div class="day-body">
      ${mapSection}
      <div class="day-content">
        <div class="timeline">${timelineHTML}</div>
        ${shopCardsHTML}
        ${tipsHTML}
      </div>
    </div>
  </div>`;
}

document.getElementById('mainContent').innerHTML = DAYS.map(renderDay).join('');

// ── Toggle functions ──
function toggle(id) {
  document.getElementById(id).classList.toggle('open');
}

function toggleMap(dayId) {
  const wrap = document.getElementById('map-wrap-d' + dayId);
  const btn = document.getElementById('maptoggle' + dayId);
  if (!wrap) return;
  const visible = wrap.classList.contains('visible');
  if (visible) {
    wrap.classList.remove('visible');
    btn.classList.remove('open');
  } else {
    wrap.classList.add('visible');
    btn.classList.add('open');
    const day = DAYS.find(d => d.id === dayId);
    if (day && day.map && !wrap._built) {
      buildMap(day, 'map-wrap-d' + dayId);
      wrap._built = true;
    }
  }
}
