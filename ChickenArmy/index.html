<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>全軍出雞 Regroup! Chicken Army</title>
<style>
:root{
  --PA:#e74c3c;--PA-l:#fadbd8;--MA:#3498db;--MA-l:#d6eaf8;
  --PD:#e67e22;--PD-l:#fdebd0;--MD:#9b59b6;--MD-l:#e8daef;
  --CO:#f1c40f;--PT:#27ae60;--bg:#1a1a2e;--panel:#16213e;--text:#eee;--border:#334;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;height:100dvh;overflow:hidden}

/* ── TITLE ── */
#title{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100dvh;gap:18px;text-align:center;padding:20px;overflow-y:auto}
#title h1{font-size:2.4rem;color:#f1c40f;text-shadow:0 0 20px #f1c40f66}
.psel{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.pbtn{padding:11px 26px;border:2px solid #f1c40f;background:transparent;color:#f1c40f;
  border-radius:8px;font-size:1.1rem;cursor:pointer;touch-action:manipulation}
.pbtn:active{background:#f1c40f22}
.legend{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;font-size:.75rem}
.li{display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:12px;background:#222}
#name-entry{display:none;flex-direction:column;align-items:center;gap:8px;margin-top:4px;width:100%;max-width:260px}
#name-entry label{font-size:.75rem;color:#888;align-self:flex-start}
.name-inp{background:#0f3460;border:2px solid #334;border-radius:7px;color:#eee;
  padding:8px 12px;font-size:1rem;width:100%;text-align:center;outline:none;
  transition:border-color .15s;-webkit-appearance:none}
.name-inp:focus{border-color:#f1c40f}
.rename-btn{background:none;border:none;color:#666;cursor:pointer;font-size:.8rem;
  padding:0 3px;line-height:1;vertical-align:middle;touch-action:manipulation}
.rename-btn:hover,.rename-btn:active{color:#f1c40f}

/* ── GAME LAYOUT ── */
#game{display:none;flex-direction:column;height:100dvh;padding:4px;gap:4px;overflow:hidden}

/* top bar */
#topbar{display:flex;align-items:center;justify-content:space-between;background:var(--panel);
  border-radius:8px;padding:5px 12px;border:1px solid var(--border);flex-shrink:0}
#phase{font-size:.9rem;font-weight:bold;color:#f1c40f}
#turnlbl,#decklbl{color:#aaa;font-size:.8rem}

/* ── MAIN TERRITORY (focus player) ── */
#main-player{flex:1;background:var(--panel);border-radius:8px;border:2px solid var(--border);
  padding:6px;display:flex;flex-direction:column;gap:4px;overflow:hidden;transition:border-color .3s}
#main-player.active{border-color:#f1c40f;box-shadow:0 0 10px #f1c40f44}
.mp-head{display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mp-name{font-weight:bold;font-size:.95rem}
.cv-inline{font-size:.7rem;font-weight:normal;color:#bbb;margin-left:5px;white-space:nowrap}
.mp-stats{display:flex;gap:8px;font-size:.82rem;flex-shrink:0}
.shp{color:#e74c3c;font-weight:bold}.sco{color:#f1c40f;font-weight:bold}
.hpbar-w{height:4px;background:#333;border-radius:3px;flex-shrink:0}
.hpbar{height:4px;border-radius:3px;transition:width .4s}
.terrlbl{font-size:.68rem;color:#888;flex-shrink:0}
.terr-wrap{overflow:auto;flex:1;-webkit-overflow-scrolling:touch}

/* ── THUMBNAIL STRIP ── */
#thumbs{display:flex;gap:5px;flex-shrink:0;overflow-x:auto;padding:2px 0;
  -webkit-overflow-scrolling:touch}
.thumb{flex-shrink:0;background:var(--panel);border:2px solid var(--border);border-radius:7px;
  padding:4px 6px;cursor:pointer;min-width:90px;transition:border-color .2s;touch-action:manipulation}
.thumb.t-active{border-color:#f1c40f!important}
.thumb.t-focused{border-color:#3498db}
.thumb.t-dead{opacity:.4}
.th-name{font-size:.7rem;font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.th-hp{height:3px;background:#333;border-radius:2px;margin:2px 0}
.th-hpbar{height:3px;border-radius:2px}
.th-cv{font-size:.6rem;color:#999;white-space:nowrap}
.th-mini{display:inline-grid;gap:1px;background:#111;border:1px solid #222;border-radius:3px;margin-top:2px}
.th-tc{display:inline-block;border-radius:1px}

/* ── TERRITORY GRID ── */
.tgrid{display:inline-grid;gap:1px;background:#111;border:1px solid #333;border-radius:4px}
.tc{width:42px;height:42px;display:flex;align-items:center;justify-content:center;
  flex-direction:column;border-radius:2px;font-size:.65rem;position:relative;user-select:none;
  touch-action:manipulation}
.tc-empty{background:#1a1a2e;border:1px dashed #2a2a4a}
.tc-valid{background:#142a14;border:2px dashed #4caf50;cursor:pointer;animation:pulse .9s infinite}
.tc-valid:hover,.tc-valid.drag-over{background:#1e4a1e;border-color:#6fcf70}
.tc-valid-over{cursor:pointer;border:2px solid #4caf50!important;
  box-shadow:inset 0 0 0 2px #4caf5044;animation:pulse .9s infinite}
.tc-valid-over.drag-over{box-shadow:inset 0 0 0 99px #4caf5033,inset 0 0 0 2px #4caf5088!important}
.tc-valid-over::after{content:"＋";position:absolute;top:1px;right:2px;font-size:.55rem;
  color:#4caf50;font-weight:bold;line-height:1}
.tc-pending{outline:3px solid #f1c40f!important;outline-offset:-2px;z-index:1}
@keyframes pulse{0%,100%{opacity:.85}50%{opacity:1}}

/* ── CARD ROW ── */
#rowarea{background:var(--panel);border-radius:8px;padding:5px 8px;
  border:1px solid var(--border);flex-shrink:0}
#rowarea h3{font-size:.7rem;color:#555;text-align:center;margin-bottom:4px}
#rowcards{display:flex;gap:6px;align-items:center;overflow-x:auto;
  padding:0 2px;-webkit-overflow-scrolling:touch}
#rowcards::-webkit-scrollbar{height:3px}
#rowcards::-webkit-scrollbar-thumb{background:#334;border-radius:2px}
.rslot{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0}
.rslot-lbl{font-size:.65rem}
.lbl-free{color:#27ae60}.lbl-1{color:#f1c40f}.lbl-2{color:#e74c3c}
.deck-pile{width:66px;height:66px;background:#0f3460;border:2px solid #334;border-radius:7px;
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  font-size:.7rem;color:#aaa;cursor:pointer;touch-action:manipulation;transition:all .15s;flex-shrink:0}
.deck-pile:active,.deck-pile:hover{border-color:#f1c40f}
.deck-pile.dsel{border-color:#f1c40f;box-shadow:0 0 10px #f1c40f;background:#163060}
.deck-pile.dempty{cursor:default;opacity:.4}
.sep{color:#333;font-size:.9rem;align-self:center;flex-shrink:0}

/* ── CARDS ── */
.gcard{border-radius:6px;border:2px solid #444;display:grid;grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr;gap:1px;background:#111;overflow:hidden;cursor:pointer;
  transition:transform .15s,box-shadow .15s;position:relative}
.gcard:active:not(.gdis),.gcard:hover:not(.gdis){transform:scale(1.06);box-shadow:0 0 10px #f1c40f88}
.gcard.gsel{border-color:#f1c40f;box-shadow:0 0 12px #f1c40f}
.gcard.gdis{cursor:default;opacity:.45}
.gcard.dragging{opacity:.5}
.ccell{display:flex;align-items:center;justify-content:center;flex-direction:column;font-size:.7rem;gap:1px}
.cPA{background:var(--PA)}.cMA{background:var(--MA)}.cPD{background:var(--PD)}
.cMD{background:var(--MD)}.cCO{background:var(--CO)}.cPOTION{background:var(--PT)}
.cPC{background:linear-gradient(135deg,#27ae60 55%,#d4ac0d 55%)}

/* drag ghost */
#drag-ghost{position:fixed;z-index:500;pointer-events:none;opacity:.85;transform:scale(1.05)}

/* ── ACTION BAR ── */
#actbar{background:var(--panel);border-radius:8px;padding:6px 10px;
  border:1px solid var(--border);display:flex;align-items:center;gap:6px;
  flex-shrink:0;flex-wrap:nowrap;overflow-x:auto}
#actmsg{flex:1;color:#ccc;font-size:.8rem;min-width:0;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis}
.abtn{padding:7px 12px;border-radius:7px;border:none;cursor:pointer;font-size:.82rem;
  font-weight:bold;transition:all .15s;white-space:nowrap;flex-shrink:0;touch-action:manipulation;
  min-height:36px}
.abtn:disabled{opacity:.3;cursor:default}
.b-rot{background:#3498db;color:#fff}.b-rot:active:not(:disabled){background:#2471a3}
.b-ok{background:#27ae60;color:#fff}.b-ok:active:not(:disabled){background:#1e8449}
.b-skip{background:#555;color:#ccc}.b-skip:active:not(:disabled){background:#666}
.b-next{background:#f1c40f;color:#1a1a2e}.b-next:active:not(:disabled){background:#d4ac0d}

/* ── LOG ── */
#logwrap{background:var(--panel);border-radius:8px;padding:4px 10px;
  border:1px solid var(--border);max-height:54px;overflow-y:auto;flex-shrink:0}
#logbox{font-size:.68rem;color:#666;line-height:1.5}
#logbox span{display:block}
.ld{color:#e74c3c}.lh{color:#27ae60}.lp{color:#f1c40f;font-weight:bold}.le{color:#e74c3c;font-weight:bold}

/* ── MODAL ── */
#modal{display:none;position:fixed;inset:0;background:#000b;align-items:center;
  justify-content:center;z-index:99}
#modal.show{display:flex}
#mbox{background:var(--panel);border-radius:14px;padding:24px;border:2px solid #f1c40f;
  text-align:center;max-width:340px;width:90%}
#mbox h2{font-size:1.6rem;color:#f1c40f;margin-bottom:8px}
#mbox p{color:#ccc;margin-bottom:16px;white-space:pre-line;font-size:.88rem}
#mbox button{padding:10px 26px;background:#f1c40f;border:none;border-radius:8px;
  font-size:1rem;font-weight:bold;cursor:pointer;color:#1a1a2e}
</style>
</head>
<body>

<!-- TITLE -->
<div id="title">
  <h1>🐔 全軍出雞</h1>
  <p style="color:#aaa;font-size:.9rem">Regroup! Chicken Army</p>
  <div class="legend">
    <div class="li"><span style="display:inline-block;width:11px;height:11px;background:var(--PA);border-radius:2px"></span>⚔物攻</div>
    <div class="li"><span style="display:inline-block;width:11px;height:11px;background:var(--MA);border-radius:2px"></span>🧙魔攻</div>
    <div class="li"><span style="display:inline-block;width:11px;height:11px;background:var(--PD);border-radius:2px"></span>🛡物防</div>
    <div class="li"><span style="display:inline-block;width:11px;height:11px;background:var(--MD);border-radius:2px"></span>🪟魔防</div>
    <div class="li"><span style="display:inline-block;width:11px;height:11px;background:var(--CO);border-radius:2px"></span>🪙金幣×2</div>
    <div class="li"><span style="display:inline-block;width:11px;height:11px;background:linear-gradient(135deg,#27ae60 55%,#d4ac0d 55%);border-radius:2px"></span>🧪🪙藥幣</div>
  </div>
  <p style="color:#888;font-size:.8rem">每格至少2個相鄰同類符號才計入戰力｜初始HP 30</p>
  <div class="psel">
    <button class="pbtn" onclick="selectCount(2)">2 人</button>
    <button class="pbtn" onclick="selectCount(3)">3 人</button>
    <button class="pbtn" onclick="selectCount(4)">4 人</button>
  </div>
  <div id="name-entry"></div>
</div>

<!-- GAME -->
<div id="game">
  <div id="topbar">
    <div id="phase">▶ 部屬</div>
    <div id="turnlbl">輪到：-</div>
    <div id="decklbl">牌堆：56</div>
  </div>

  <!-- focus player territory -->
  <div id="main-player">
    <div class="mp-head">
      <div class="mp-name" id="mp-name">-</div>
      <div class="mp-stats">
        <span class="shp" id="mp-hp">❤30</span>
        <span class="sco" id="mp-coins">🪙×0</span>
      </div>
    </div>
    <div class="hpbar-w"><div class="hpbar" id="mp-hpbar" style="width:100%;background:#27ae60"></div></div>
    <div class="terrlbl" id="mp-lbl">-</div>
    <div class="terr-wrap" id="mp-terr"></div>
  </div>

  <!-- thumbnail strip -->
  <div id="thumbs"></div>

  <!-- card row -->
  <div id="rowarea">
    <h3>— 中央牌列 —</h3>
    <div id="rowcards"></div>
  </div>

  <!-- action bar: msg + rotate + place + skip + next -->
  <div id="actbar">
    <div id="actmsg">請選牌</div>
    <button class="abtn b-rot" id="brot" onclick="doRotate()" disabled>↻</button>
    <button class="abtn b-ok"  id="bok"  onclick="doConfirm()" disabled>✓</button>
    <button class="abtn b-skip" id="bskip" onclick="doSkip()" disabled>跳過</button>
    <button class="abtn b-next" id="bnext" onclick="doNext()" disabled>下一步▶</button>
  </div>
  <div id="logwrap"><div id="logbox"></div></div>
</div>

<!-- MODAL -->
<div id="modal"><div id="mbox">
  <h2 id="mtitle">遊戲結束</h2>
  <p id="mbody"></p>
  <button onclick="location.reload()">再玩一次</button>
</div></div>

<!-- drag ghost placeholder -->
<div id="drag-ghost" style="display:none"></div>

<script>
// ══════════════════════════════════════════
// CUSTOM ICON SUPPORT
// PNG files in same folder: PA.png MA.png PD.png MD.png CO.png PC.png
// ══════════════════════════════════════════
const CUSTOM_ICONS = {};
const ICON_TYPES = ['PA','MA','PD','MD','CO','PC'];
function loadCustomIcons() {
  ICON_TYPES.forEach(t => {
    const img = new Image();
    img.onload = () => { CUSTOM_ICONS[t] = img.src; };
    img.src = `${t}.png`;
  });
}
loadCustomIcons();

// ══════════════════════════════════════════
// 56 CARD DEFINITIONS
// Rules: each card's 4 cells use distinct types
// Types: PA MA PD MD CO(×2) PC(藥幣，×1)
// CO cells: exactly 5 in deck, all count:2
// PC   cells: exactly 5 in deck, all count:1
// ══════════════════════════════════════════
const CARDS = [
  // ── Pure combat {PA,MA,PD,MD} — 46 cards ──
  // All ×1 (4 cards)
  [['PA',1],['MA',1],['PD',1],['MD',1]],   // 0
  [['MA',1],['PA',1],['MD',1],['PD',1]],   // 1
  [['PD',1],['MD',1],['PA',1],['MA',1]],   // 2
  [['MD',1],['PD',1],['MA',1],['PA',1]],   // 3
  // PA×2 (4 cards)
  [['PA',2],['MA',1],['PD',1],['MD',1]],   // 4
  [['MA',1],['PA',2],['MD',1],['PD',1]],   // 5
  [['PA',2],['MD',1],['MA',1],['PD',1]],   // 6
  [['PD',1],['PA',2],['MA',1],['MD',1]],   // 7
  // MA×2 (3 cards)
  [['MA',2],['PA',1],['PD',1],['MD',1]],   // 8
  [['PA',1],['MA',2],['MD',1],['PD',1]],   // 9
  [['MD',1],['MA',2],['PA',1],['PD',1]],   // 10
  // PD×2 (3 cards)
  [['PD',2],['PA',1],['MA',1],['MD',1]],   // 11
  [['PA',1],['PD',2],['MD',1],['MA',1]],   // 12
  [['MA',1],['MD',1],['PD',2],['PA',1]],   // 13
  // MD×2 (3 cards)
  [['MD',2],['MA',1],['PD',1],['PA',1]],   // 14
  [['PA',1],['MD',2],['MA',1],['PD',1]],   // 15
  [['PD',1],['PA',1],['MA',1],['MD',2]],   // 16
  // PA+MA×2 (3 cards)
  [['PA',2],['MA',2],['PD',1],['MD',1]],   // 17
  [['MA',2],['PA',2],['MD',1],['PD',1]],   // 18
  [['PA',2],['MA',2],['MD',1],['PD',1]],   // 19
  // PA+PD×2 (3 cards)
  [['PA',2],['MA',1],['PD',2],['MD',1]],   // 20
  [['PD',2],['MA',1],['PA',2],['MD',1]],   // 21
  [['PA',2],['MD',1],['PD',2],['MA',1]],   // 22
  // PA+MD×2 (3 cards)
  [['PA',2],['MA',1],['PD',1],['MD',2]],   // 23
  [['MA',1],['PA',2],['PD',1],['MD',2]],   // 24
  [['MD',2],['MA',1],['PA',2],['PD',1]],   // 25
  // MA+PD×2 (3 cards)
  [['MA',2],['PA',1],['PD',2],['MD',1]],   // 26
  [['PA',1],['MA',2],['PD',2],['MD',1]],   // 27
  [['PD',2],['MA',2],['PA',1],['MD',1]],   // 28
  // MA+MD×2 (3 cards)
  [['MA',2],['PA',1],['PD',1],['MD',2]],   // 29
  [['PA',1],['MA',2],['MD',2],['PD',1]],   // 30
  [['MD',2],['MA',2],['PA',1],['PD',1]],   // 31
  // PD+MD×2 (3 cards)
  [['PD',2],['MD',2],['PA',1],['MA',1]],   // 32
  [['PA',1],['MA',1],['PD',2],['MD',2]],   // 33
  [['MD',2],['PD',2],['MA',1],['PA',1]],   // 34
  // PA+MA+PD×2 (2 cards)
  [['PA',2],['MA',2],['PD',2],['MD',1]],   // 35
  [['MA',2],['PA',2],['MD',1],['PD',2]],   // 36
  // PA+MA+MD×2 (2 cards)
  [['PA',2],['MA',2],['PD',1],['MD',2]],   // 37
  [['MA',2],['MD',2],['PA',2],['PD',1]],   // 38
  // PA+PD+MD×2 (2 cards)
  [['PA',2],['MA',1],['PD',2],['MD',2]],   // 39
  [['MD',2],['PA',2],['PD',2],['MA',1]],   // 40
  // MA+PD+MD×2 (2 cards)
  [['MA',2],['PA',1],['PD',2],['MD',2]],   // 41
  [['PD',2],['MD',2],['MA',2],['PA',1]],   // 42
  // All ×2 (2 cards)
  [['PA',2],['MA',2],['PD',2],['MD',2]],   // 43
  [['MA',2],['PA',2],['MD',2],['PD',2]],   // 44
  // Extra arrangement (1 card)
  [['PA',1],['PD',1],['MA',1],['MD',1]],   // 45 — total pure = 46

  // ── CO (×2) cards — 5 cards ──
  // CO replaces one combat type; CO always count:2
  [['PA',1],['MA',1],['PD',1],['CO',2]], // 46 — no MD
  [['PA',1],['MA',1],['CO',2],['MD',1]], // 47 — no PD
  [['PA',1],['CO',2],['PD',1],['MD',1]], // 48 — no MA
  [['CO',2],['MA',1],['PD',1],['MD',1]], // 49 — no PA
  [['PA',2],['MA',1],['CO',2],['MD',1]], // 50 — no PD, PA heavy

  // ── PC (藥幣) cards — 5 cards ──
  // PC = 1 potion + 1 coin; count always 1
  [['PA',1],['MA',1],['PD',1],['PC',1]],   // 51 — no MD
  [['PA',1],['MA',1],['PC',1],['MD',1]],   // 52 — no PD
  [['PA',1],['PC',1],['PD',1],['MD',1]],   // 53 — no MA
  [['PC',1],['MA',1],['PD',1],['MD',1]],   // 54 — no PA
  [['PA',1],['MA',2],['PD',1],['PC',1]],   // 55 — no MD, MA heavy
];
// trim to exactly 56
while(CARDS.length>56) CARDS.pop();
while(CARDS.length<56) CARDS.push([['PA',1],['MA',1],['PD',1],['MD',1]]);
console.assert(CARDS.length===56,'Card count should be 56');

const ICONS  = {PA:'⚔',MA:'🧙',PD:'🛡',MD:'🪟',CO:'🪙',POTION:'🧪',PC:'🧪'};
const COLORS  = {PA:'#e74c3c',MA:'#3498db',PD:'#e67e22',MD:'#9b59b6',
                 CO:'#f1c40f',POTION:'#27ae60',
                 PC:'linear-gradient(135deg,#27ae60 55%,#d4ac0d 55%)'};
const PCOLORS = ['#e74c3c','#3498db','#27ae60','#9b59b6'];
const PNAMES  = ['玩家1','玩家2','玩家3','玩家4'];

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let G;

function newGame(n, names=PNAMES) {
  const deck = shuffle([...Array(56).keys()]);
  const row  = [deck.pop(), deck.pop(), deck.pop()];
  const players = Array.from({length:n},(_,i)=>({
    id:i, name:(names[i]||PNAMES[i]).trim()||PNAMES[i], color:PCOLORS[i],
    hp:30, coins:0, eliminated:false,
    territory: new Map([
      ['0,0',{type:'PA',count:1}],['1,0',{type:'MA',count:1}],
      ['0,1',{type:'PD',count:1}],['1,1',{type:'MD',count:1}],
    ]),
  }));
  G = {
    n, players, deck, row,
    phase:'deploy', roundNum:1,
    firstPlayer:0, deployIdx:0, currentPlayer:0,
    focusPlayer:0,
    selRowIdx:null, selCardId:null, selRot:0,
    selFromDeck:false, pendingPos:null,
  };
}

// ══════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════
function shuffle(a){
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}
  return a;
}
function rotCells(cells,r){
  if(r===0)return cells;
  if(r===1)return[cells[2],cells[0],cells[3],cells[1]];
  if(r===2)return[cells[3],cells[2],cells[1],cells[0]];
  return[cells[1],cells[3],cells[0],cells[2]];
}
function cardPos(gx,gy){return[[gx,gy],[gx+1,gy],[gx,gy+1],[gx+1,gy+1]];}
function rowCost(idx){return[2,1,0][idx]??0;}

// ── Territory helpers ──
function terrBounds(terr){
  let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
  for(const k of terr.keys()){
    const[x,y]=k.split(',').map(Number);
    if(x<minX)minX=x;if(x>maxX)maxX=x;if(y<minY)minY=y;if(y>maxY)maxY=y;
  }
  return{minX,maxX,minY,maxY};
}
function validTL(terr){
  const{minX,maxX,minY,maxY}=terrBounds(terr);
  const result=new Set();
  for(let gy=minY-1;gy<=maxY+1;gy++){
    for(let gx=minX-1;gx<=maxX+1;gx++){
      const overlaps=cardPos(gx,gy).filter(([x,y])=>terr.has(`${x},${y}`)).length;
      if(overlaps>=1)result.add(`${gx},${gy}`);
    }
  }
  return result;
}
function placeCard(terr,gx,gy,cardDef,rot){
  const cells=rotCells(cardDef,rot);
  cardPos(gx,gy).forEach(([x,y],i)=>{terr.set(`${x},${y}`,{type:cells[i][0],count:cells[i][1]});});
}
function calcCV(terr){
  const res={PA:0,MA:0,PD:0,MD:0};
  for(const t of['PA','MA','PD','MD']){
    const tCells=new Map();
    for(const[k,v]of terr)if(v.type===t)tCells.set(k,v.count);
    const visited=new Set();
    for(const start of tCells.keys()){
      if(visited.has(start))continue;
      const comp=[],q=[start];visited.add(start);
      while(q.length){
        const cur=q.shift();comp.push(cur);
        const[cx,cy]=cur.split(',').map(Number);
        for(const[dx,dy]of[[1,0],[-1,0],[0,1],[0,-1]]){
          const nk=`${cx+dx},${cy+dy}`;
          if(!visited.has(nk)&&tCells.has(nk)){visited.add(nk);q.push(nk);}
        }
      }
      if(comp.length>=2)comp.forEach(k=>{res[t]+=tCells.get(k);});
    }
  }
  return res;
}
function countRes(terr){
  let coins=0,potions=0;
  for(const v of terr.values()){
    if(v.type==='CO')  {coins+=v.count;}          // CO×2 = 2幣
    if(v.type==='POTION'){potions+=v.count;}
    if(v.type==='PC')    {coins+=1;potions+=1;}     // 藥幣：1藥+1幣
  }
  return{coins,potions};
}
function terrCoins(terr){return countRes(terr).coins;}

// ── Row management ──
function takeFromRow(idx){
  if(G.deck.length>0){G.row.splice(idx,1);G.row.unshift(G.deck.pop());}
  else{G.row[idx]=null;}
}

// ══════════════════════════════════════════
// PHASE CONTROLLERS
// ══════════════════════════════════════════
function activePlayers(){return G.players.filter(p=>!p.eliminated);}

function resetSelection(){
  G.selRowIdx=null;G.selCardId=null;G.selRot=0;
  G.selFromDeck=false;G.pendingPos=null;
}

function nextDeployPlayer(){
  G.deployIdx++;
  const active=activePlayers();
  if(G.deployIdx>=active.length){G.deployIdx=0;runCombat();return;}
  const ordered=[];
  for(let i=0;i<G.n;i++){
    const pi=(G.firstPlayer+i)%G.n;
    if(!G.players[pi].eliminated)ordered.push(pi);
  }
  G.currentPlayer=ordered[G.deployIdx];
  G.focusPlayer=G.currentPlayer;
  resetSelection();
  render();
}

function runCombat(){
  G.phase='combat';
  addLog('═══ ⚔ 戰鬥 ═══','lp');
  const cvs=G.players.map(p=>p.eliminated?null:calcCV(p.territory));
  const dmg=Array(G.n).fill(0);
  for(let a=0;a<G.n;a++){
    if(G.players[a].eliminated)continue;
    for(let d=0;d<G.n;d++){
      if(d===a||G.players[d].eliminated)continue;
      const ph=Math.max(0,cvs[a].PA-cvs[d].PD);
      const mg=Math.max(0,cvs[a].MA-cvs[d].MD);
      const tot=ph+mg;
      if(tot>0||cvs[a].PA>0||cvs[a].MA>0){
        const phStr=`⚔${cvs[a].PA}-🛡${cvs[d].PD}=${ph>0?'-'+ph:'0'}`;
        const mgStr=`${ICONS.MA}${cvs[a].MA}-${ICONS.MD}${cvs[d].MD}=${mg>0?'-'+mg:'0'}`;
        addLog(`${G.players[a].name}→${G.players[d].name}: ${phStr} ${mgStr}${tot>0?' ('+tot+'傷)':''}`, tot>0?'ld':'');
      }
      dmg[d]+=tot;
    }
  }
  G.players.forEach((p,i)=>{if(!p.eliminated)p.hp=Math.max(0,p.hp-dmg[i]);});
  render();
}

function runRegroup(){
  G.phase='regroup';
  addLog('═══ 🔄 盤整 ═══','lp');
  G.players.forEach(p=>{
    if(p.eliminated)return;
    const{potions}=countRes(p.territory);
    if(potions>0){p.hp=Math.min(30,p.hp+potions);addLog(`${p.name} +${potions}HP→${p.hp}`,'lh');}
  });
  G.players.forEach(p=>{
    if(!p.eliminated&&p.hp<=0){p.eliminated=true;addLog(`💀 ${p.name} 淘汰`,'le');}
  });
  const alive=activePlayers();
  if(alive.length<=1){endGame(alive[0]||null);return;}
  if(G.deck.length===0&&G.row.filter(x=>x!=null).length===0){endByScore();return;}
  render();
}

function startNextRound(){
  G.roundNum++;G.phase='deploy';G.deployIdx=0;
  G.firstPlayer=0;
  let fp=0;
  while(G.players[fp].eliminated)fp=(fp+1)%G.n;
  G.currentPlayer=fp;G.focusPlayer=fp;
  resetSelection();
  addLog(`══ 第${G.roundNum}回合 ══`,'lp');
  render();
}

function endGame(winner){
  render();
  document.getElementById('mtitle').textContent=winner?`🏆 ${winner.name} 獲勝！`:'🏆 遊戲結束';
  document.getElementById('mbody').textContent=winner?`以 ${winner.hp} HP 存活！`:'所有玩家同時淘汰！';
  document.getElementById('modal').classList.add('show');
}
function endByScore(){
  render();
  const alive=activePlayers().sort((a,b)=>b.hp-a.hp);
  document.getElementById('mtitle').textContent='🏆 牌堆耗盡';
  document.getElementById('mbody').textContent=`${alive[0].name} 以最高 ${alive[0].hp} HP 獲勝！\n`+alive.map(p=>`${p.name}:${p.hp}HP`).join(' | ');
  document.getElementById('modal').classList.add('show');
}

// ══════════════════════════════════════════
// USER ACTIONS
// ══════════════════════════════════════════
function selectCard(rowIdx){
  if(G.phase!=='deploy')return;
  if(G.selFromDeck)return;
  const cp=G.players[G.currentPlayer];
  const cost=rowCost(rowIdx);
  const coins=terrCoins(cp.territory);
  if(coins<cost){addLog(`陣地金幣格不足（需${cost}個，現有${coins}個）`,'ld');return;}
  G.selRowIdx=rowIdx;G.selCardId=G.row[rowIdx];
  G.selRot=0;G.selFromDeck=false;G.pendingPos=null;
  G.focusPlayer=G.currentPlayer;
  render();
}

function selectDeckTop(){
  if(G.phase!=='deploy')return;
  if(G.deck.length===0)return;
  G.selFromDeck=true;G.selRowIdx=null;
  G.selCardId=G.deck[G.deck.length-1];
  G.selRot=0;G.pendingPos=null;
  G.focusPlayer=G.currentPlayer;
  render();
}

function doRotate(){
  if(G.selCardId===null)return;
  G.selRot=(G.selRot+1)%4;
  render();
}

function doConfirm(){
  if(G.selCardId===null||!G.pendingPos)return;
  const cp=G.players[G.currentPlayer];
  const[gx,gy]=G.pendingPos;
  placeCard(cp.territory,gx,gy,CARDS[G.selCardId],G.selRot);
  if(G.selFromDeck){
    G.deck.pop();
    addLog(`${cp.name} 抽牌堆頂，放牌(${gx},${gy})`);
  }else{
    const cost=rowCost(G.selRowIdx);
    takeFromRow(G.selRowIdx);
    addLog(`${cp.name} 取${cost>0?cost+'🪙':'免費'}牌，放(${gx},${gy})`);
  }
  resetSelection();
  nextDeployPlayer();
}

function doSkip(){
  addLog(`${G.players[G.currentPlayer].name} 跳過`);
  resetSelection();
  nextDeployPlayer();
}

function doNext(){
  if(G.phase==='combat')runRegroup();
  else if(G.phase==='regroup')startNextRound();
}

function setFocus(pi){
  G.focusPlayer=pi;
  renderFocusPlayer();
  renderThumbs();
}

// TERRITORY CLICK
// ══════════════════════════════════════════
function terrClick(pi,gx,gy){
  if(pi!==G.currentPlayer||G.selCardId===null)return;
  G.pendingPos=[gx,gy];
  renderFocusPlayer();
  renderActBar();
}

// ══════════════════════════════════════════
// RENDERING
// ══════════════════════════════════════════
function render(){
  renderFocusPlayer();
  renderThumbs();
  renderRow();
  renderActBar();
}

// icon helper: custom PNG (fills cell) or emoji (centered)
function iconHTML(type, sz){
  if(CUSTOM_ICONS[type])
    return `<img src="${CUSTOM_ICONS[type]}" style="width:${sz}px;height:${sz}px;object-fit:cover;display:block">`;
  return `<span style="font-size:${Math.round(sz*.75)}px;line-height:1">${ICONS[type]}</span>`;
}

function cellSVG(type,count,sz=38){
  // PC 藥幣：特殊對角漸層 + 雙圖示（不用自訂圖，直接雙格）
  if(type==='PC'){
    if(CUSTOM_ICONS['PC']){
      return `<div style="background:linear-gradient(135deg,#27ae60 55%,#d4ac0d 55%);
        width:${sz}px;height:${sz}px;border-radius:3px;position:relative;overflow:hidden">
        <img src="${CUSTOM_ICONS['PC']}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover">
      </div>`;
    }
    const hs=Math.round(sz*.34);
    return `<div style="background:linear-gradient(135deg,#27ae60 55%,#d4ac0d 55%);
      width:${sz}px;height:${sz}px;border-radius:3px;
      display:flex;align-items:center;justify-content:center;gap:1px">
      <span style="font-size:${hs}px;line-height:1">🧪</span>
      <span style="font-size:${hs}px;line-height:1">🪙</span>
    </div>`;
  }
  if(CUSTOM_ICONS[type]){
    // 自訂圖示：整格滿版，數字 badge 疊在右下角
    return `<div style="background:${COLORS[type]};width:${sz}px;height:${sz}px;border-radius:3px;
      position:relative;overflow:hidden">
      <img src="${CUSTOM_ICONS[type]}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover">
      ${count>1?`<span style="position:absolute;bottom:1px;right:2px;font-size:${Math.round(sz*.3)}px;
        color:#fff;font-weight:bold;text-shadow:0 1px 3px #0009;line-height:1">×${count}</span>`:''}
    </div>`;
  }
  // 預設 emoji 模式
  const iconSz=Math.round(sz*.42);
  return `<div style="background:${COLORS[type]};width:${sz}px;height:${sz}px;border-radius:3px;
    display:flex;align-items:center;justify-content:center;flex-direction:column">
    <span style="font-size:${iconSz}px;line-height:1">${ICONS[type]}</span>
    ${count>1?`<span style="font-size:${Math.round(sz*.24)}px;color:#fff;margin-top:1px">×${count}</span>`:''}
  </div>`;
}

function cardHTML(def,rot,sz=72,extra=''){
  const cells=rotCells(def,rot);
  const cs=Math.floor(sz/2)-2;
  return `<div class="gcard ${extra}" style="width:${sz}px;height:${sz}px">
    ${cells.map(([t,c])=>`<div class="ccell c${t}">${cellSVG(t,c,cs)}</div>`).join('')}
  </div>`;
}

// ── Focus Player Panel ──
function renderFocusPlayer(){
  const pi=G.focusPlayer;
  const p=G.players[pi];
  const cv=calcCV(p.territory);
  const res=countRes(p.territory);
  const isAct=G.phase==='deploy'&&pi===G.currentPlayer&&!p.eliminated;
  const hpPct=Math.max(0,p.hp/30*100);
  const hpC=p.hp>20?'#27ae60':p.hp>10?'#f1c40f':'#e74c3c';

  const panel=document.getElementById('main-player');
  panel.className=isAct?'active':'';

  document.getElementById('mp-name').innerHTML=
    `<span style="color:${p.color}">● ${p.name}${p.eliminated?' ✕':''}</span>`+
    `<button class="rename-btn" onclick="renamePlayer(${pi})" title="修改名稱">✏️</button>`+
    `<span class="cv-inline"> ⚔${cv.PA} ${ICONS.MA}${cv.MA} 🛡${cv.PD} ${ICONS.MD}${cv.MD} 🧪${res.potions}</span>`;
  document.getElementById('mp-hp').textContent=`❤${p.hp}`;
  document.getElementById('mp-coins').textContent=`🪙×${res.coins}`;
  document.getElementById('mp-hpbar').style.cssText=`width:${hpPct}%;background:${hpC}`;
  document.getElementById('mp-lbl').textContent=`陣地${p.territory.size}格`;
  document.getElementById('mp-terr').innerHTML=renderTerr(p,pi);
}

function renderTerr(player,pi){
  const terr=player.territory;
  const{minX,maxX,minY,maxY}=terrBounds(terr);
  let validSet=new Set();
  const isActiveDeploy=G.phase==='deploy'&&pi===G.currentPlayer&&G.selCardId!==null&&!player.eliminated;
  if(isActiveDeploy)validSet=validTL(terr);

  // pending preview: cells covered by card at pendingPos
  const pendingSet=new Set();
  if(G.pendingPos&&pi===G.currentPlayer){
    cardPos(G.pendingPos[0],G.pendingPos[1]).forEach(([x,y])=>pendingSet.add(`${x},${y}`));
  }
  const pendingCells=G.pendingPos?rotCells(CARDS[G.selCardId],G.selRot):null;

  let vminX=minX,vmaxX=maxX,vminY=minY,vmaxY=maxY;
  for(const k of validSet){
    const[x,y]=k.split(',').map(Number);
    if(x<vminX)vminX=x;if(x+1>vmaxX)vmaxX=x+1;
    if(y<vminY)vminY=y;if(y+1>vmaxY)vmaxY=y+1;
  }
  if(G.pendingPos&&pi===G.currentPlayer){
    const[px,py]=G.pendingPos;
    if(px<vminX)vminX=px;if(px+1>vmaxX)vmaxX=px+1;
    if(py<vminY)vminY=py;if(py+1>vmaxY)vmaxY=py+1;
  }
  const cols=vmaxX-vminX+1;

  let html='';
  for(let y=vminY;y<=vmaxY;y++){
    for(let x=vminX;x<=vmaxX;x++){
      const k=`${x},${y}`;
      const cell=terr.get(k);
      const isValidTL=validSet.has(k);
      const isPending=pendingSet.has(k);

      // determine pending preview cell content
      let pendingOverlay='';
      if(isPending&&pendingCells){
        const pos=cardPos(G.pendingPos[0],G.pendingPos[1]);
        const idx=pos.findIndex(([px,py])=>px===x&&py===y);
        if(idx>=0){
          const[t,c]=pendingCells[idx];
          pendingOverlay=`style="background:${COLORS[t]};opacity:.85"`;
        }
      }

      const pendingClass=isPending?' tc-pending':'';
      const dragAttrs='';

      if(isValidTL&&cell&&!isPending){
        html+=`<div class="tc tc-valid-over"
          data-pi="${pi}" data-x="${x}" data-y="${y}"
          onclick="terrClick(${pi},${x},${y})"
          ${dragAttrs}>${cellSVG(cell.type,cell.count,40)}</div>`;
      }else if(isValidTL&&!cell&&!isPending){
        html+=`<div class="tc tc-valid"
          data-pi="${pi}" data-x="${x}" data-y="${y}"
          onclick="terrClick(${pi},${x},${y})"
          ${dragAttrs}>＋</div>`;
      }else if(isPending&&pendingCells){
        const pos=cardPos(G.pendingPos[0],G.pendingPos[1]);
        const idx=pos.findIndex(([px,py])=>px===x&&py===y);
        const[t,c]=pendingCells[idx>=0?idx:0];
        html+=`<div class="tc tc-pending"
          data-pi="${pi}" data-x="${x}" data-y="${y}"
          onclick="terrClick(${pi},${x},${y})"
          title="預覽位置">${cellSVG(t,c,40)}</div>`;
      }else if(cell){
        html+=`<div class="tc"
          data-x="${x}" data-y="${y}">${cellSVG(cell.type,cell.count,40)}</div>`;
      }else{
        html+=`<div class="tc tc-empty" data-x="${x}" data-y="${y}"></div>`;
      }
    }
  }
  return`<div class="tgrid" style="grid-template-columns:repeat(${cols},42px)">${html}</div>`;
}

// ── Thumbnail Strip ──
function renderThumbs(){
  const area=document.getElementById('thumbs');
  area.innerHTML=G.players.map((p,i)=>{
    const cv=calcCV(p.territory);
    const res=countRes(p.territory);
    const hpPct=Math.max(0,p.hp/30*100);
    const hpC=p.hp>20?'#27ae60':p.hp>10?'#f1c40f':'#e74c3c';
    const isCur=G.phase==='deploy'&&i===G.currentPlayer&&!p.eliminated;
    const isFoc=i===G.focusPlayer;
    const cls=`thumb${isCur?' t-active':''}${isFoc?' t-focused':''}${p.eliminated?' t-dead':''}`;
    const mini=renderMini(p.territory);
    return `<div class="${cls}" onclick="setFocus(${i})" style="border-color:${isCur?'#f1c40f':isFoc?'#3498db':p.color}">
      <div class="th-name" style="color:${p.color}">● ${p.name}${p.eliminated?' ✕':''}</div>
      <div class="th-hp"><div class="th-hpbar" style="width:${hpPct}%;background:${hpC}"></div></div>
      <div class="th-cv">⚔${cv.PA} ${ICONS.MA}${cv.MA} 🛡${cv.PD} ${ICONS.MD}${cv.MD} 🧪${res.potions} ❤${p.hp}</div>
      ${mini}
    </div>`;
  }).join('');
}

function renderMini(terr){
  const{minX,maxX,minY,maxY}=terrBounds(terr);
  const cols=maxX-minX+1;
  const sz=8;
  let html='';
  for(let y=minY;y<=maxY;y++)
    for(let x=minX;x<=maxX;x++){
      const c=terr.get(`${x},${y}`);
      html+=`<div class="th-tc" style="width:${sz}px;height:${sz}px;background:${c?COLORS[c.type]:'#1a1a2e'};border:1px solid #111"></div>`;
    }
  return`<div class="th-mini" style="grid-template-columns:repeat(${cols},${sz}px)">${html}</div>`;
}

// ── Card Row ──
function renderRow(){
  const cp=G.players[G.currentPlayer];
  const coins=terrCoins(cp.territory);
  const lblCls=['lbl-2','lbl-1','lbl-free'];
  const lblTxt=['需🪙×2','需🪙×1','免費'];
  const deckEmpty=G.deck.length===0;
  const deckSel=G.selFromDeck;

  const deckInner = deckSel && G.selCardId!==null
    ? cardHTML(CARDS[G.selCardId], G.selRot, 66, 'gsel')
    : `<span style="font-size:1.6rem">🎴</span><span>${G.deck.length}</span>`;
  const deckStyle = deckSel && G.selCardId!==null
    ? 'background:transparent;border:none;padding:0;width:auto;height:auto'
    : '';
  let html=`<div class="rslot">
    <div class="rslot-lbl lbl-free">免費抽</div>
    <div class="deck-pile${deckSel?' dsel':deckEmpty?' dempty':''}"
         onclick="selectDeckTop()" title="免費抽牌堆頂" style="${deckStyle}">
      ${deckInner}
    </div>
  </div>
  <span class="sep">→</span>`;

  G.row.forEach((cid,idx)=>{
    if(cid==null)return;
    const cost=rowCost(idx);
    const canBuy=G.phase==='deploy'&&!cp.eliminated&&coins>=cost&&!G.selFromDeck;
    const isSel=G.selRowIdx===idx;
    const rot=isSel?G.selRot:0;
    html+=`<div class="rslot">
      <div class="rslot-lbl ${lblCls[idx]}">${lblTxt[idx]}</div>
      <div onclick="selectCard(${idx})"
           style="cursor:${canBuy?'pointer':'default'}">
        ${cardHTML(CARDS[cid],rot,66,isSel?'gsel':canBuy?'':'gdis')}
      </div>
    </div>`;
    if(idx<G.row.length-1)html+=`<span class="sep">→</span>`;
  });

  document.getElementById('rowcards').innerHTML=html;
}

// ── Action Bar ──
function renderActBar(){
  const cp=G.players[G.currentPlayer];
  const e=id=>document.getElementById(id);
  e('phase').textContent=G.phase==='deploy'?'▶ 部屬':G.phase==='combat'?'⚔ 戰鬥':'🔄 盤整';
  e('turnlbl').textContent=G.phase==='deploy'?`輪到：${cp.name}`:`第${G.roundNum}回合`;
  e('decklbl').textContent=`牌堆：${G.deck.length}`;

  if(G.phase==='deploy'){
    const coins=terrCoins(cp.territory);
    e('bskip').disabled=false; e('bnext').disabled=true;
    e('brot').disabled=G.selCardId===null;
    e('bok').disabled=!(G.selCardId!==null&&G.pendingPos);
    if(G.pendingPos){
      e('actmsg').textContent=`位置(${G.pendingPos[0]},${G.pendingPos[1]})，↻旋轉 ✓放置`;
    }else if(G.selFromDeck){
      e('actmsg').textContent=`${cp.name} 已翻頂牌，點綠格放置`;
    }else if(G.selCardId!==null){
      e('actmsg').textContent=`${cp.name} 已選牌，點/拖曳至綠格`;
    }else{
      e('actmsg').textContent=`${cp.name} 選牌｜🪙×${coins}`;
    }
  }else if(G.phase==='combat'){
    e('brot').disabled=true; e('bok').disabled=true;
    e('bskip').disabled=true; e('bnext').disabled=false;
    e('actmsg').textContent='⚔ 戰鬥結算，按下一步進入盤整';
  }else{
    e('brot').disabled=true; e('bok').disabled=true;
    e('bskip').disabled=true; e('bnext').disabled=false;
    e('actmsg').textContent='🔄 盤整完畢，按下一步開始下回合';
  }
}


// ══════════════════════════════════════════
// LOG
// ══════════════════════════════════════════
function addLog(msg,cls=''){
  const box=document.getElementById('logbox');
  const s=document.createElement('span');
  if(cls)s.className=cls;
  s.textContent=msg;
  box.appendChild(s);
  const w=document.getElementById('logwrap');
  w.scrollTop=w.scrollHeight;
}

// ══════════════════════════════════════════
// START
// ══════════════════════════════════════════
function selectCount(n){
  const div=document.getElementById('name-entry');
  div.style.display='flex';
  div.innerHTML=
    `<div style="color:#aaa;font-size:.8rem;margin-bottom:2px">輸入玩家名稱</div>`+
    Array.from({length:n},(_,i)=>
      `<input class="name-inp" id="ni${i}" value="${PNAMES[i]}" maxlength="10"
       style="border-color:${PCOLORS[i]}"
       onkeydown="if(event.key==='Enter'){var nx=document.getElementById('ni${i+1}');nx?nx.focus():startWithNames(${n})}">`
    ).join('')+
    `<button class="pbtn" style="margin-top:4px;padding:9px 30px" onclick="startWithNames(${n})">開始遊戲 ▶</button>`;
  setTimeout(()=>{const el=document.getElementById('ni0');if(el)el.select();},60);
}

function startWithNames(n){
  const names=Array.from({length:n},(_,i)=>{
    const v=(document.getElementById(`ni${i}`)?.value||'').trim();
    return v||PNAMES[i];
  });
  startGame(n,names);
}

function startGame(n, names=PNAMES){
  document.getElementById('title').style.display='none';
  document.getElementById('game').style.display='flex';
  newGame(n,names);
  addLog(`🐔 全軍出雞開始！${n}人局`,'lp');
  addLog(`第1回合 — ${G.players[0].name} 先手`,'lp');
  render();
}

function renamePlayer(pi){
  const cur=G.players[pi].name;
  const nw=(prompt(`玩家${pi+1} 新名稱：`,cur)||'').trim();
  if(nw&&nw!==cur){G.players[pi].name=nw;render();}
}
</script>
